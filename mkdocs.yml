site_name: SSDv2
site_url: https://laster13.github.io/ssdv2_docs/
site_author: ProjetSSD
site_description: Simple Seedbox Docker moderne, sécurisé et optimisé.

repo_name: projetssd/ssdv2
repo_url: https://github.com/projetssd/ssdv2
edit_uri: edit/main/docs/

docs_dir: docs
exclude_docs: overrides/

copyright: >
  Copyright &copy; 2024 - ProjetSSD

theme:
  name: material

  language: fr

  font:
    text: Roboto
    code: Roboto Mono

  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      primary: indigo
      scheme: default
      toggle:
        icon: material/weather-sunny 
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: blue grey
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  features:
    # UX moderne
    #- navigation.instant
    #- navigation.instant.progress
    #- navigation.instant.prefetch
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes

    # Contenu
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view

    # TOC
    - toc.follow
    #- toc.integrate
    - toc_depth: 3

    # Recherche avancée
    - search.highlight
    - search.share
    - search.suggest

plugins:
  - search

  - include-markdown:
      opening_tag: "{!"
      closing_tag: "!}"

  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      zoomable: true
      draggable: true

  - callouts

  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: fr
          default: true
          name: Français
          build: true

  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      timezone: Europe/Paris
      locale: fr

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/projetssd/ssdv2

  generator: false

  announcement: |
    🚀 SSDv2 v2 — Documentation modernisée et section Sécurité renforcée.

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

markdown_extensions:

  # Core
  - meta
  - def_list
  - attr_list
  - footnotes
  - tables
  - smarty

  - toc:
      permalink: true
      toc_depth: 4

  # Material
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys

  - pymdownx.arithmatex:
      generic: true
      smart_dollar: false

